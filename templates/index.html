<!DOCTYPE html>
<html>

<head>

<title>Welcome Moni Ji🌸✨</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Playfair Display', serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
animation: pageFade 1.5s ease;
}

.floating-food{
    pointer-events:none;
}

.floating-food span{
    position: fixed;
    bottom: -50px;
    font-size: 28px;
    animation: floatFood 12s linear infinite;
    opacity:0.8;
}

.floating-food span:nth-child(1){ left:10%; animation-delay:0s; }
.floating-food span:nth-child(2){ left:25%; animation-delay:2s; }
.floating-food span:nth-child(3){ left:40%; animation-delay:4s; }
.floating-food span:nth-child(4){ left:55%; animation-delay:1s; }
.floating-food span:nth-child(5){ left:70%; animation-delay:3s; }
.floating-food span:nth-child(6){ left:85%; animation-delay:5s; }
.floating-food span:nth-child(7){ left:50%; animation-delay:6s; }
.floating-food span:nth-child(8){ left:30%; animation-delay:7s; }

@keyframes floatFood{
    0%{
        transform: translateY(0);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    100%{
        transform: translateY(-110vh);
        opacity:0;
    }
}

/* Morning */
.morning{
    background: linear-gradient(135deg,#FFD580,#FFB347);
}

/* Afternoon */
.afternoon{
   background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* Evening */
.evening{
background: linear-gradient(-45deg,#667eea,#764ba2,#667eea,#764ba2);
background-size:400% 400%;
animation: skyMove 15s ease infinite;
}

/* Night */
.night{
background: linear-gradient(-45deg,#1a2a6c,#2b5876,#4e4376,#203a43);
background-size:400% 400%;
animation: skyMove 15s ease infinite;
}

.moon{
position:fixed;
top:80px;
right:120px;
width:70px;
height:70px;
background:#fff7cc;
border-radius:50%;
box-shadow:0 0 40px rgba(255,255,200,0.8);
}
.heart{
display:inline-block;
animation: heartbeat 1.5s infinite;
}
#clock{
margin-top:10px;
font-size:20px;
font-weight:bold;
color:#444;
}
.container{
background: rgba(255,255,255,0.85);
padding:40px;
border-radius:15px;
backdrop-filter: blur(10px);

display:flex;
flex-direction:column;
align-items:center;

text-align:center;

box-shadow:
0 0 15px rgba(255,255,255,0.5),
0 0 30px rgba(255,150,200,0.3),
0 0 45px rgba(150,150,255,0.3);

animation: floatCard 4s ease-in-out infinite;
}

@keyframes cardPop{

    0%{
        transform: scale(0.7);
        opacity:0;
    }

    100%{
        transform: scale(1);
        opacity:1;
    }

}
.greeting{
font-weight:bold;
background: linear-gradient(90deg,#ff9a9e,#fad0c4,#667eea);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: gradientMove 4s linear infinite;
}

@keyframes gradientMove{

0%{
background-position:0%;
}

100%{
background-position:200%;
}

}
@keyframes glow{

    from{
        text-shadow: 0 0 5px #fff;
    }

    to{
        text-shadow: 0 0 15px #ff9a9e, 0 0 25px #fad0c4;
    }

}
@keyframes floatCard{

0%{
transform: translateY(0px);
}

50%{
transform: translateY(-10px);
}

100%{
transform: translateY(0px);
}

}
@keyframes heartbeat{

0%{
transform: scale(1);
}

25%{
transform: scale(1.2);
}

50%{
transform: scale(1);
}

75%{
transform: scale(1.2);
}

100%{
transform: scale(1);
}

}
@keyframes pageFade{

0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}

}


input{
    padding:10px;
    width:200px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:10px;
    transition: all 0.3s ease;
}    
  input:focus{
outline:none;
border:1px solid #667eea;
box-shadow:0 0 8px rgba(102,126,234,0.6);
}
button{
padding:12px 26px;
margin-top:15px;
border:none;
background: linear-gradient(45deg,#667eea,#764ba2);
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition: all 0.3s ease;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
transform: scale(1.1);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button:active{
transform: scale(0.95);
}

.thought{
    margin-top:15px;
    font-style:italic;
    color:#555;
    font-size:18px;
}

</style>

</head>

<body class="{{ bg }}">

<div class="moon"></div>

<div class="floating-food">
  <span>🍕</span>
  <span>🍔</span>
  <span>🍟</span>
  <span>🍦</span>
  <span>🥟</span>
  <span>🌮</span>
  <span>🍩</span>
  <span>🍜</span>
</div>

<div class="container">

<h1>Welcome Moni Ji🌸✨</h1>

<div id="clock"></div>

<form method="POST">

<input type="text" name="name" placeholder="Enter your name">

<br>

<button type="submit">Greet Me</button>

</form>

{% if name %}

<h2>
<span class="greeting">{{ greeting }} {{ name }}</span> 🫡 
<span class="heart">💗</span>
</h2>

<p class="thought">"{{ thought }}"</p>
{% endif %}

</div>
<script>

function updateClock(){

let now = new Date();

let hours = now.getHours();
let minutes = now.getMinutes();
let seconds = now.getSeconds();

if(minutes < 10) minutes = "0" + minutes;
if(seconds < 10) seconds = "0" + seconds;

let time = hours + ":" + minutes + ":" + seconds;

document.getElementById("clock").innerHTML = time;

}

setInterval(updateClock,1000);
updateClock();

</script>
</body>

</html>
